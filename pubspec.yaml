name: flutter_markup
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0+1

environment:
    sdk: ^3.11.0

dependencies:
    flutter:
        sdk: flutter
    flutter_svg: ^2.2.4

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0

flutter:
    uses-material-design: true
    assets:
        - assets/images/logo-img-blue.svg
        - assets/images/logo-img-white.svg
    fonts:
        - family: League Spartan
          fonts:
              - asset: assets/fonts/LeagueSpartan-VariableFont_wght.ttf
